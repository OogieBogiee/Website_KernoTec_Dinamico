    <div class="container7 " id="tcon">

            <div class="container">

            <div class="parte1">
                <div class="containercontac">
                    <form id="contact_form">
                        <div class="form-group" >
                            <div class="group"> 
                                <input type="text" id="nombre" name="nombre" required>
                                <span class="bar"></span>
                                <label for="nombre">Nombre</label>
                        </div>
                        <div class="group">
                            <input type="email" id="correo" name="correo" required>
                            <span class="highlight"></span>
                            <span class="bar"></span>
                            <label for="correo">Correo electrónico</label>
                        </div>
                    </div>
                     <div  class="form-group">
                            <div class="group">
                                <input type="tel" id="phone"  name="tel" required oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                                <span class="bar"></span>
                                <label for="phone">Teléfono de Contacto</label>
                            </div>
                            <div class="group">
                                <div class="custom-select" id="interes-select">
                                    <button type="button" class="custom-select-trigger" id="interes-trigger" aria-haspopup="listbox" aria-expanded="false">
                                        <span class="custom-select-value"></span>
                                    </button>
                                    <div class="custom-select-menu" id="interes-menu" role="listbox" aria-labelledby="interes-trigger" tabindex="-1"></div>
                                </div>
                                <input type="hidden" id="interes" name="interes" />
                                <span class="bar1"></span>
                                <label for="interes">Área de interés</label>
                            </div>
                        </div>    
                        <div class="group textarea">
                            <textarea class="group" type="text" rows="5" id="mensaje" name="mensaje" required ></textarea>
                            <span class="bar2"></span> 
                            <label>¿Cómo podemos ayudarte?</label>                          
                        </div>
                        <div class="button-captcha">
                            <div class="butonOrange-footer">
                                <button id="success" type="submit"  class="botonOrange1"> Hablemos</button>
                            </div>
                            <div class="captcha" id="captcha"></div> 
                        </div>                    
                    </form>
                </div>
            </div>

            <div class="parte2">
                <div class="parte4">
                    <div class="map-responsive">

<script>
    $(window).scroll(function () {
        if ($(this).scrollTop() > 300) {
            $('a.scroll-top').stop(true, true).fadeIn('slow');
        } else {
            $('a.scroll-top').stop(true, true).fadeOut('slow');
        }
    });
    $('a.scroll-top').click(function (event) {
        event.preventDefault();
        $('html, body').animate({ scrollTop: 0 }, 80);
    });
</script>
